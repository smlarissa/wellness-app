const API_KEY_STORAGE = 'wellness_api_key';

async function aiCall(system, userMsg) {
  const key = localStorage.getItem(API_KEY_STORAGE);
  if (!key) throw new Error("NO_KEY");
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system,messages:[{role:"user",content:userMsg}]})
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  const txt = d.content?.map(b=>b.text||"").join("")||"";
  return JSON.parse(txt.replace(/```json|```/g,"").trim());
}

async function lookupFood(desc) {
  return aiCall(
    `You are a nutrition database that knows Brazilian and American foods fluently. Return ONLY raw JSON, no markdown. Schema: {"name":"...","calories":number,"protein":number,"carbs":number,"fat":number,"serving":"...","inflammation":"low"|"medium"|"high","inflammationReason":"one plain sentence","swap":"better alternative or null"}. Inflammation: low=anti-inflammatory (fish,berries,leaves,olive oil,nuts,eggs,avocado,feijão,frango,açaí); medium=neutral; high=processed,seed oils,refined sugar,gluten,alcohol,fritura. Macros in grams to 1 decimal. Calories whole number.`,
    `Food: ${desc}`
  );
}

async function proofWorkout(exercises) {
  return aiCall(
    `You review workout plans for a 44yo woman with lipedema doing body recomposition. Equipment: 4lb dumbbells, resistance bands 10-30lb. Goal: toned/athletic feminine look, no bulk. Return ONLY raw JSON. Schema: {"overallVerdict":"Safe"|"Mostly Safe"|"Review Needed","summary":"2 plain sentences","items":[{"exercise":"...","status":"good"|"caution"|"flag","reason":"plain sentence","alternative":"if flag/caution else null","trainerQuestion":"question to ask trainer or null"}]}. Be direct. No fluff. Flag: high-impact moves, excessive lower limb load, lymphatic stress risk.`,
    `Exercises: ${JSON.stringify(exercises)}`
  );
}

function useSessionTimer(){
  const [elapsed,setElapsed]=useState(0);
  const [running,setRunning]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    if(running){ref.current=setInterval(()=>setElapsed(e=>e+1),1000);}
    else clearInterval(ref.current);
    return()=>clearInterval(ref.current);
  },[running]);
  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  return{elapsed,running,fmt,toggle:()=>setRunning(r=>!r),reset:()=>{setElapsed(0);setRunning(false);}};
}
function useRestTimer(){
  const [rest,setRest]=useState(0);
  const [active,setActive]=useState(false);
  const [total,setTotal]=useState(60);
  const ref=useRef(null);
  useEffect(()=>{
    if(active&&rest>0){ref.current=setInterval(()=>setRest(r=>{if(r<=1){setActive(false);return 0;}return r-1;}),1000);}
    else clearInterval(ref.current);
    return()=>clearInterval(ref.current);
  },[active,rest]);
  const start=s=>{setTotal(s);setRest(s);setActive(true);};
  return{rest,active,total,start};
}

function inflamScore(entries){
  if(!entries.length)return null;
  const map={low:0,medium:1,high:2};
  const avg=entries.reduce((s,e)=>s+(map[e.inflammation]??1),0)/entries.length;
  if(avg<0.4)return{label:"Excellent",color:C.sage,pct:10};
  if(avg<0.9)return{label:"Good",color:C.sage,pct:35};
  if(avg<1.4)return{label:"Moderate",color:C.gold,pct:62};
  return{label:"High",color:C.danger,pct:88};
}

              <Btn active onClick={searchFood} disabled={foodLoading||!foodQ.trim()} style={{flexShrink:0,padding:"8px 14px"}}>{foodLoading?"…":"Go"}</Btn>
            </div>
            <Btn small onClick={()=>setShowSaved(s=>!s)} style={{marginBottom:8}}>{showSaved?`Hide saved (${saved.length})`:`Saved foods (${saved.length})`}</Btn>
            {showSaved&&saved.length>0&&(
              <div style={{background:C.surface,borderRadius:10,padding:"10px 12px",marginBottom:10,maxHeight:160,overflowY:"auto"}}>
                {saved.map((s,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:i<saved.length-1?`1px solid ${C.border}`:"none"}}>
                    <div>
                      <div style={{fontSize:12,fontWeight:600}}>{s.name}</div>
                      <div style={{fontSize:10,color:C.muted}}>{s.serving} · {s.calories} kcal</div>
                    </div>
                    <Btn small active color={C.sage} onClick={()=>addFood(s)}>+ Add</Btn>
                  </div>
                ))}
              </div>
            )}
            {foodErr&&<div style={{fontSize:12,color:C.danger,marginTop:6}}>{foodErr}</div>}
            {aiFood&&(
              <div style={{background:C.surface,borderRadius:12,padding:"14px",marginTop:8,border:`1px solid ${C.sage}44`}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                  <div>
                    <div style={{fontSize:14,fontWeight:700}}>{aiFood.name}</div>
                    <div style={{fontSize:11,color:C.muted}}>{aiFood.serving}</div>
                  </div>
                  <div style={{fontSize:18,fontWeight:800,color:C.rose}}>{aiFood.calories} kcal</div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:10}}>
                  {[["Protein",aiFood.protein,C.rose],["Carbs",aiFood.carbs,C.gold],["Fat",aiFood.fat,C.sage]].map(([l,v,col])=>(
                    <div key={l} style={{textAlign:"center",background:C.card,borderRadius:8,padding:"8px 4px"}}>
                      <div style={{fontSize:15,fontWeight:800,color:col}}>{v}g</div>
                      <div style={{fontSize:10,color:C.muted}}>{l}</div>
                    </div>
                  ))}
                </div>
                {aiFood.inflammation&&(
                  <div style={{background:INFLAM[aiFood.inflammation].color+"18",border:`1px solid ${INFLAM[aiFood.inflammation].color}33`,borderRadius:8,padding:"8px 12px",marginBottom:10}}>
                    <div style={{fontSize:11,fontWeight:700,color:INFLAM[aiFood.inflammation].color,marginBottom:3}}>● {INFLAM[aiFood.inflammation].label}</div>
                    <div style={{fontSize:11,color:C.muted}}>{aiFood.inflammationReason}</div>
                    {aiFood.swap&&<div style={{fontSize:11,color:C.sage,marginTop:4}}>Swap: {aiFood.swap}</div>}
                  </div>
                )}
                <div style={{display:"flex",gap:8}}>
                  <Btn active color={C.sage} onClick={()=>addFood(aiFood)} style={{flex:1}}>✓ Add</Btn>
                  <Btn onClick={()=>{setAiFood(null);setFoodQ("");}} style={{padding:"8px 14px"}}>✕</Btn>
                </div>
              </div>
            )}
          </Card>

          {entries.length>0&&<Card>
            <Lbl>Today's log</Lbl>
            {entries.map((e,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"8px 0",borderBottom:i<entries.length-1?`1px solid ${C.border}`:"none"}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                    {e.inflammation&&<span style={{color:INFLAM[e.inflammation]?.color,fontSize:9}}>●</span>}
                    <span style={{fontSize:13,fontWeight:600}}>{e.name}</span>
                  </div>
                  <div style={{fontSize:11,color:C.muted,marginTop:2}}>{e.serving&&`${e.serving} · `}P:{e.pro}g C:{e.carb}g F:{e.fat}g</div>
                  {e.swap&&<div style={{fontSize:11,color:C.sage,marginTop:2}}>Swap: {e.swap}</div>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginLeft:8}}>
                  <span style={{fontSize:13,fontWeight:700,color:C.rose}}>{e.cal} kcal</span>
                  <button onClick={()=>removeFood(i)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:16,padding:0}}>×</button>
                </div>
              </div>
            ))}
          </Card>}
        </div>}

        {/* WORKOUT */}
        {tab==="workout"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Card>
            <Lbl>Session Timer</Lbl>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <div style={{fontSize:34,fontWeight:800,color:session.running?C.rose:C.muted,letterSpacing:"0.04em",fontVariantNumeric:"tabular-nums"}}>{session.fmt(session.elapsed)}</div>
              <div style={{display:"flex",gap:8}}>
                <Btn active={session.running} color={C.rose} onClick={session.toggle}>{session.running?"Pause":session.elapsed>0?"Resume":"Start"}</Btn>
                {session.elapsed>0&&<Btn onClick={session.reset}>Reset</Btn>}
              </div>
            </div>
          </Card>

          <Card>
            <Lbl>Rest Timer</Lbl>
            <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",marginBottom:restT.active?10:0}}>
              <div style={{fontSize:26,fontWeight:800,color:restT.active?C.gold:C.muted,minWidth:64,fontVariantNumeric:"tabular-nums"}}>{restT.active?`${restT.rest}s`:"—"}</div>
              {[30,45,60,90].map(s=><Btn key={s} small active={restT.active&&restT.rest===s} color={C.gold} onClick={()=>restT.start(s)}>{s}s</Btn>)}
            </div>
            {restT.active&&<div style={{background:C.border,borderRadius:6,height:5}}>
              <div style={{height:"100%",borderRadius:6,background:C.gold,transition:"width 1s linear",width:`${(restT.rest/restT.total)*100}%`}}/>
            </div>}
          </Card>

          {dayType==="vacation"&&<Card style={{border:`1px solid ${C.sky}44`}}>
            <Lbl color={C.sky}>Travel Workout — No Equipment</Lbl>
            <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto"}}>
              {TRAVEL_WORKOUTS.map((w,i)=><Btn key={i} small active={vacWorkout===i} color={C.sky} onClick={()=>setVacWorkout(i)} style={{flexShrink:0}}>{w.focus}</Btn>)}
            </div>
            <div style={{fontSize:11,color:C.muted,marginBottom:12}}>~{TRAVEL_WORKOUTS[vacWorkout].dur} · no equipment needed</div>
            {TRAVEL_WORKOUTS[vacWorkout].exercises.map((ex,i)=>(
              <div key={i} style={{background:C.surface,borderRadius:10,padding:"10px 12px",marginBottom:8,border:`1px solid ${C.border}`}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:13,fontWeight:700}}>{ex.name}</span>
                  <Pill color={C.gold}>{ex.sets}</Pill>
                </div>
                <div style={{fontSize:11,color:C.muted}}>{ex.tip}</div>
              </div>
            ))}
            <div style={{marginTop:10,background:C.sky+"12",borderRadius:10,padding:"10px 12px",border:`1px solid ${C.sky}33`}}>
              <div style={{fontSize:10,color:C.sky,fontWeight:800,marginBottom:6}}>LIPEDEMA TRAVEL TIPS</div>
              <div style={{fontSize:11,color:C.muted,lineHeight:1.7}}>• Compression on long flights<br/>• Walk every hour on planes<br/>• Drink water, not just coffee and wine<br/>• Elevate legs in hotel after long days<br/>• Walking tours count — city walking is great</div>
            </div>
          </Card>}

          {dayType==="vacation"&&<Card>
            <Lbl>Back Home — Re-entry Plan</Lbl>
            {[{week:"Week 1",label:"Bridge",note:"Drop to 2 sets per exercise. Same movements, less volume. Let your body remember.",color:C.gold},{week:"Week 2",label:"Back to normal",note:"Return to full program. You'll be close to where you left off. Any soreness is normal, not regression.",color:C.sage}].map((r,i)=>(
              <div key={i} style={{background:C.surface,borderRadius:10,padding:"12px",marginBottom:8,border:`1px solid ${C.border}`}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:13,fontWeight:700}}>{r.week}</span><Pill color={r.color}>{r.label}</Pill></div>
                <div style={{fontSize:12,color:C.muted,lineHeight:1.6}}>{r.note}</div>
              </div>
            ))}
            <div style={{fontSize:11,color:C.muted,marginTop:4,lineHeight:1.6}}>Any puffiness after travel is fluid, not fat. Settles in a few days. Don't let the scale mislead you.</div>
          </Card>}

          <Card>
            <Lbl>Workout Proofer</Lbl>
            <div style={{fontSize:12,color:C.muted,marginBottom:12,lineHeight:1.6}}>Enter your trainer's exercises. Each one gets checked for lipedema risks.</div>
            {proofList.map((ex,i)=>(
              <div key={i} style={{display:"flex",gap:6,marginBottom:8,alignItems:"center"}}>
                <input value={ex.name} onChange={e=>updateEx(i,"name",e.target.value)} placeholder="Exercise" style={{flex:2}}/>
                <input value={ex.sets} onChange={e=>updateEx(i,"sets",e.target.value)} placeholder="Sets" style={{flex:1}}/>
                <input value={ex.reps} onChange={e=>updateEx(i,"reps",e.target.value)} placeholder="Reps" style={{flex:1}}/>
                {proofList.length>1&&<button onClick={()=>removeEx(i)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:18,padding:"0 4px"}}>×</button>}
              </div>
            ))}
            <div style={{display:"flex",gap:8,marginTop:6}}>
              <Btn small onClick={addExRow}>+ Add</Btn>
              <Btn small active color={C.rose} onClick={runProof} disabled={proofLoading||!proofList.some(x=>x.name.trim())}>{proofLoading?"Checking…":"Proof it"}</Btn>
            </div>
            {proofErr&&<div style={{fontSize:12,color:C.danger,marginTop:8}}>{proofErr}</div>}
            {proofResult&&<div style={{marginTop:14}}>
              <div style={{background:(verdictColor[proofResult.overallVerdict]||C.muted)+"18",borderRadius:10,padding:"12px",marginBottom:12}}>
                <div style={{fontSize:10,color:C.muted,fontWeight:700,marginBottom:4}}>VERDICT</div>
                <div style={{fontSize:15,fontWeight:800,color:verdictColor[proofResult.overallVerdict]||C.muted}}>{proofResult.overallVerdict}</div>
                <div style={{fontSize:12,color:C.muted,marginTop:4,lineHeight:1.5}}>{proofResult.summary}</div>
              </div>
              {proofResult.items?.map((item,i)=>(
                <div key={i} style={{background:C.surface,borderRadius:10,padding:"12px",marginBottom:8,borderLeft:`3px solid ${item.status==="good"?C.sage:item.status==="caution"?C.gold:C.danger}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:13,fontWeight:700}}>{item.exercise}</span><Pill color={item.status==="good"?C.sage:item.status==="caution"?C.gold:C.danger}>{item.status}</Pill></div>
                  <div style={{fontSize:12,color:C.muted,lineHeight:1.5}}>{item.reason}</div>
                  {item.alternative&&<div style={{fontSize:12,color:C.sage,marginTop:5}}>Try: {item.alternative}</div>}
                  {item.trainerQuestion&&<div style={{fontSize:12,color:C.sky,marginTop:5,fontStyle:"italic"}}>Ask trainer: "{item.trainerQuestion}"</div>}
                </div>
              ))}
            </div>}
          </Card>
        </div>}

        {/* FOOD */}
        {tab==="food"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Card style={{background:"linear-gradient(135deg,#0d1a14,#1c1c22)"}}>
            <Lbl color={C.sage}>Diet Principle</Lbl>
            <div style={{fontSize:13,color:"#9dd4b5",lineHeight:1.7}}>Protein stays at {targets.protein}g every day — train or rest. Carbs go up on training days. Gentle deficit only (200–300 kcal max). No aggressive cuts — raises cortisol, worsens lipedema.</div>
          </Card>
          <Card>
            <Lbl>Targets — train vs rest</Lbl>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {[{l:"Calories",tr:PROFILE.train.calories,re:PROFILE.rest.calories,col:C.rose},{l:"Protein",tr:PROFILE.train.protein,re:PROFILE.rest.protein,col:C.rose},{l:"Carbs",tr:PROFILE.train.carbs,re:PROFILE.rest.carbs,col:C.gold},{l:"Fat",tr:PROFILE.train.fat,re:PROFILE.rest.fat,col:C.sage}].map(t=>(
                <div key={t.l} style={{background:C.surface,borderRadius:12,padding:"10px",border:`1px solid ${C.border}`}}>
                  <div style={{fontSize:9,color:C.muted,fontWeight:700,letterSpacing:"0.06em",marginBottom:6}}>{t.l}</div>
                  <div style={{display:"flex",justifyContent:"space-around",alignItems:"center"}}>
                    <div style={{textAlign:"center"}}><div style={{fontSize:16,fontWeight:800,color:t.col}}>{t.tr}</div><div style={{fontSize:9,color:C.muted}}>🏋️</div></div>
                    <div style={{width:1,height:24,background:C.border}}/>
                    <div style={{textAlign:"center"}}><div style={{fontSize:16,fontWeight:800,color:t.col}}>{t.re}</div><div style={{fontSize:9,color:C.muted}}>🌿</div></div>
                  </div>
                </div>
              ))}
            </div>
          </Card>
          <Card>
            <Lbl>Meal ideas — gluten-free & anti-inflammatory</Lbl>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
              {Object.keys(MEAL_IDEAS).map(m=><Btn key={m} small active={mealTab===m} color={C.gold} onClick={()=>setMealTab(m)} style={{textTransform:"capitalize"}}>{m}</Btn>)}
            </div>
            {MEAL_IDEAS[mealTab].map((meal,i)=>(
              <div key={i} style={{display:"flex",gap:10,padding:"8px 0",borderBottom:i<MEAL_IDEAS[mealTab].length-1?`1px solid ${C.border}`:"none"}}>
                <div style={{width:5,height:5,borderRadius:"50%",background:C.gold,marginTop:5,flexShrink:0}}/>
                <span style={{fontSize:13,lineHeight:1.5}}>{meal}</span>
              </div>
            ))}
          </Card>
          {saved.length>0&&<Card>
            <Lbl>Your food library ({saved.length})</Lbl>
            <div style={{fontSize:11,color:C.muted,marginBottom:10}}>Builds automatically as you log foods.</div>
            {saved.map((s,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:i<saved.length-1?`1px solid ${C.border}`:"none"}}>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                    {s.inflammation&&<span style={{color:INFLAM[s.inflammation]?.color,fontSize:9}}>●</span>}
                    <span style={{fontSize:13,fontWeight:600}}>{s.name}</span>
                  </div>
                  <div style={{fontSize:11,color:C.muted}}>{s.serving} · {s.calories} kcal · P:{s.protein}g</div>
                </div>
                <Btn small active color={C.sage} onClick={()=>{setTab("today");addFood(s);}}>+ Add</Btn>
              </div>
            ))}
          </Card>}
        </div>}

        {/* PROGRESS */}
        {tab==="progress"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Card style={{background:"linear-gradient(135deg,#1a0e0e,#1c1c22)"}}>
            <Lbl color={C.rose}>What to track with lipedema</Lbl>
            <div style={{fontSize:13,color:C.roseL,lineHeight:1.7}}>The scale lies with lipedema — fluid shifts daily. Your measurements tell the real story. Waist and thighs shrinking while strength increases = you're doing it right, even if the number stays the same.</div>
          </Card>
          <Btn active color={C.rose} onClick={()=>setShowMForm(v=>!v)} style={{width:"100%",padding:11,fontSize:13}}>{showMForm?"✕ Cancel":"+ Log measurements"}</Btn>
          {showMForm&&<Card>
            <Lbl>{new Date().toLocaleDateString("en-GB")}</Lbl>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
              {MEASURE_FIELDS.map(f=>(
                <div key={f.key}>
                  <div style={{fontSize:10,color:C.muted,marginBottom:4}}>{f.label} ({f.unit})</div>
                  <input type="number" step="0.1" value={newM[f.key]||""} onChange={e=>setNewM(p=>({...p,[f.key]:e.target.value}))} placeholder="0.0"/>
                </div>
              ))}
            </div>
            <Btn active color={C.sage} onClick={saveMeasure} style={{width:"100%",padding:11}}>Save</Btn>
          </Card>}
          {measurements.length===0?<Card><div style={{textAlign:"center",padding:"24px 0",color:C.muted}}><div style={{fontSize:32,marginBottom:10}}>📏</div><div style={{fontSize:14,fontWeight:700,marginBottom:6}}>No entries yet</div><div style={{fontSize:12}}>Log your first measurements above</div></div></Card>
          :measurements.map((m,i)=>(
            <Card key={i}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <Lbl>{m.date}</Lbl>
                {i===0&&<Pill color={C.rose}>Latest</Pill>}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}}>
                {MEASURE_FIELDS.filter(f=>m[f.key]).map(f=>{
                  const prev=measurements[i+1]?.[f.key];
                  const curr=parseFloat(m[f.key]);
                  const diff=prev?(curr-parseFloat(prev)).toFixed(1):null;
                  const lossFields=["weight","waist","hips","thigh_l","thigh_r","calf_l","calf_r"];
                  const good=diff!==null&&(lossFields.includes(f.key)?parseFloat(diff)<0:parseFloat(diff)>0);
                  return(
                    <div key={f.key} style={{background:C.surface,borderRadius:9,padding:"9px 7px",textAlign:"center",border:`1px solid ${C.border}`}}>
                      <div style={{fontSize:9,color:C.muted,marginBottom:3}}>{f.label}</div>
                      <div style={{fontSize:14,fontWeight:800}}>{m[f.key]}<span style={{fontSize:9,color:C.muted}}>{f.unit}</span></div>
                      {diff!==null&&<div style={{fontSize:10,marginTop:2,color:parseFloat(diff)===0?C.muted:good?C.sage:C.gold}}>{parseFloat(diff)>0?"+":""}{diff}</div>}
                    </div>
                  );
                })}
              </div>
            </Card>
          ))}
        </div>}

        {/* PROFILE */}
        {tab==="profile"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Card style={{border:`1px solid ${C.sky}44`}}>
            <Lbl color={C.sky}>Vacation Setup</Lbl>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
              <input value={vacDest} onChange={e=>setVacDest(e.target.value)} placeholder="Destination (e.g. Italy)"/>
              <div style={{display:"flex",gap:8}}>
                <div style={{flex:1}}><div style={{fontSize:10,color:C.muted,marginBottom:4}}>Start</div><input type="date" value={vacStart} onChange={e=>setVacStart(e.target.value)}/></div>
                <div style={{flex:1}}><div style={{fontSize:10,color:C.muted,marginBottom:4}}>End</div><input type="date" value={vacEnd} onChange={e=>setVacEnd(e.target.value)}/></div>
              </div>
            </div>
            <Btn active={dayType==="vacation"} color={C.sky} onClick={()=>setDayType("vacation")} style={{width:"100%",padding:11}}>{dayType==="vacation"?"✓ Vacation mode on":"Activate vacation mode"}</Btn>
            {dayType==="vacation"&&<Btn onClick={()=>setDayType("train")} style={{width:"100%",padding:11,marginTop:8,fontSize:11}}>Back to normal</Btn>}
          </Card>
          <Card>
            <Lbl>Your profile</Lbl>
            {[["Age","44"],["Weight","50 kg"],["Height","154 cm"],["Condition","Lipedema"],["Goal","Body recomposition — toned, defined, feminine"],["Diet","High-protein · Anti-inflammatory · Gluten-free"],["Equipment","4lb dumbbells + resistance bands (10–30lb)"],["Activity","Very active (5+ days/week)"],["Location","USA / Brazil"]].map(([k,v])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${C.border}`,gap:10}}>
                <span style={{fontSize:11,color:C.muted,fontWeight:700,minWidth:80}}>{k}</span>
                <span style={{fontSize:12,fontWeight:600,textAlign:"right"}}>{v}</span>
              </div>
            ))}
          </Card>
          <Card style={{background:"linear-gradient(135deg,#1a0e0e,#1c1c22)"}}>
            <Lbl color={C.rose}>Lipedema — what this means for you</Lbl>
            {[["Calories","Gentle deficit only — 200–300 max. Cutting hard raises cortisol and makes lipedema worse."],["Training","Resistance builds definition without bulk. Low-impact only. No jumping or heavy plyometrics."],["Carbs","More on training days for fuel. Less on rest days to reduce inflammation."],["Scale","Don't use it as your main metric. Fluid shifts daily with lipedema. Use measurements."],["Lymphatics","Walk daily. Stay hydrated. Compression garments help, especially after training and flying."],["Progress","Recomposition is slow. Expect 3–6 months to see clear visual change. Consistency beats intensity."]].map(([k,v])=>(
              <div key={k} style={{marginBottom:12}}>
                <div style={{fontSize:11,color:C.roseL,fontWeight:700,marginBottom:3}}>→ {k}</div>
                <div style={{fontSize:12,color:C.muted,lineHeight:1.6}}>{v}</div>
              </div>
            ))}
          </Card>
          <Card>
            <Lbl>API Key</Lbl>
            <div style={{fontSize:12,color:C.muted,marginBottom:10}}>Used for AI food search and workout proofer.</div>
            <Btn small color={C.danger} onClick={()=>{localStorage.removeItem(API_KEY_STORAGE);setHasKey(false);}}>Reset API key</Btn>
          </Card>
          <Card><div style={{fontSize:11,color:C.muted,textAlign:"center",lineHeight:1.7}}>General wellness guidance only.<br/>Check with your doctor before major changes.</div></Card>
        </div>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
